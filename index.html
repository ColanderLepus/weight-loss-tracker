<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weight Tracker</title>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Sora", "Segoe UI", "sans-serif"],
              display: ["Fraunces", "serif"]
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/styles.css" />

  <body class="min-h-screen bg-slate-950 text-slate-100">

        </p>
        <div class="mt-6 flex flex-wrap gap-3">
          <a href="pages/setup.html" class="rounded-xl bg-teal-400 px-4 py-2.5 font-semibold text-slate-900 hover:bg-teal-300">Start Setup</a>
          <a href="pages/entries.html" class="rounded-xl bg-slate-800 px-4 py-2.5 font-semibold hover:bg-slate-700">Go to Entries</a>

      </section>
    </main>
